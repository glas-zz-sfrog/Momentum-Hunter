[argus_office]
version = "0.1"
name = "Argus Office"
front_door_agent = "argus_orchestrator"
ceo = "Steven"
ceo_advisor = "ChatGPT"
commit_policy = "one approved scoped commit per task when acceptance criteria pass"
push_policy = "no push without explicit approval"
merge_policy = "Git Steward may fast-forward merge to master only after explicit Steven approval; Steven is final merge approver"

allowed_scaffold_paths = [
  "AGENTS.md",
  ".codex/**",
  "docs/argus-office/**",
]

protected_areas = [
  "core scoring logic",
  "trade readiness logic",
  "replay identity rules",
  "historical capture selection",
  "database schema/migrations",
  "broker/order execution behavior",
  "alert threshold semantics",
  "secrets/API keys/env config",
  "production configs",
  "runtime behavior",
]

[argus_office.operating_model]
orchestrator = "single Codex-side front door for multiagent work"
goal_steward = "owns goal framing, Goal Charters, and acceptance alignment"
git_steward = "owns branch safety, Git preflight, merge safety, and push refusal"
office_manager = "maintains office structure and operating rules"
builder = "only normal code-writing agent"
qa_regression = "may write tests only when explicitly assigned"
release_scribe = "updates docs, reports, logs, and checklists; does not approve merges"
specialists = "artifact-first within role; produce concrete files, specs, reports, checklists, mockups, briefs, or handoffs; advice-only only when blocked"
graphics_designer = "creates visual assets, mockups, layout specs, and asset handoffs without app-code changes unless explicitly assigned"
product_roadmap_agent = "creates prioritized tickets, acceptance criteria, sequencing plans, and decision records"
app_architect = "creates architecture notes, boundary maps, ADRs, migration plans, and refactor sequencing without app-code changes by default"
autonomous_agents = "read-only/spec-only by default; define autonomous planning, risk, broker, paper, research, chart, and audit boundaries"
